{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- UPDATED: Keep a single title block for each page -->
    <title>{% block title %}Saroj Kumar Mahato Portfolio{% endblock %}</title>
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'pages/css/styles.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    {% block extra_css %}{% endblock %}
</head>
<body>

<header id="header">
    <nav class="navbar">
        <div class="nav-container">
            <a href="{% url 'home' %}" class="logo">
                <img src="{% static 'images/skm logo.png' %}" alt="SKM Logo">
            </a>

            <!-- Hamburger menu -->
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <ul class="nav-links" id="nav-links">
                <li><a href="{% url 'home' %}">Home</a></li>
                <li><a href="{% url 'about' %}">About</a></li>
                <li><a href="{% url 'contact' %}">Contact</a></li>
                <li><a href="{% url 'blog' %}">Blog</a></li>
            </ul>
        </div>
    </nav>
</header>

<main class="main-content">
    <!-- UPDATED: content block for page content -->
    {% block content %}{% endblock %}
</main>

<footer id="footer">
    <div class="footer-content">
        <p>© 2026 Saroj Kumar Mahato. All rights reserved.</p>

        <div class="social-icons">
            <a href="https://github.com/s-k-m1" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-github"></i>
            </a>
            
            <a href="https://www.facebook.com/share/18Dr382Ajv/" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-facebook"></i>
            </a>

            <a href="https://www.instagram.com/0skm5.0/" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-instagram"></i>
            </a>

            <a href="https://www.linkedin.com/in/saroj-kumar-mahato-212382351/" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-linkedin"></i>
            </a>
        </div>
    </div>
</footer>
<script src="{% static 'js/base.js' %}"></script>
</body>
</html>
