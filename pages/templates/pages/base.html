{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Saroj Kumar Mahato Portfolio{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'pages/css/styles.css' %}">
</head>
<body>

<header id="header">
    <nav class="navbar">
        <div class="nav-container">
            <a href="{% url 'home' %}" class="logo">
                <img src="{% static 'images/skm logo.png' %}" alt="SKM Logo">
            </a>

            <!-- Hamburger menu -->
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <ul class="nav-links" id="nav-links">
                <li><a href="{% url 'home' %}">Home</a></li>
                <li><a href="{% url 'about' %}">About</a></li>
                <li><a href="{% url 'contact' %}">Contact</a></li>
                <li><a href="{% url 'blog' %}">Blog</a></li>
            </ul>
        </div>
    </nav>
</header>

<main class="main-content">
    {% block content %}{% endblock %}
</main>

<footer id="footer">
    <p>© 2026 Saroj Kumar Mahato. All rights reserved.</p>
</footer>

<!-- JS: Smart hide/show navbar/footer + Hamburger -->
<script>
const header = document.getElementById("header");
const footer = document.getElementById("footer");
let lastScroll = 0;

// Hide/show header/footer on scroll
window.addEventListener("scroll", () => {
    const currentScroll = window.pageYOffset;

    if (currentScroll > lastScroll) {
        // Scrolling down → hide
        header.style.top = "-100px";
        footer.style.bottom = "-100px";
    } else {
        // Scrolling up → show
        header.style.top = "0";
        footer.style.bottom = "0";
    }

    lastScroll = currentScroll;
});

// Hamburger toggle for mobile
const hamburger = document.getElementById("hamburger");
const navLinks = document.getElementById("nav-links");

hamburger.addEventListener("click", () => {
    navLinks.classList.toggle("active");
});

const links = document.querySelectorAll('.nav-links a');

links.forEach(link => {
    link.addEventListener('click', () => {
        link.classList.remove('active'); // reset animation
        void link.offsetWidth;           // trigger reflow
        link.classList.add('active');    // start animation
    });
});

</script>
</body>
</html>
